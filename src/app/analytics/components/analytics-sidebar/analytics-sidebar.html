<div class="offcanvas-lg offcanvas-start bg-dark text-white border-end shadow d-flex flex-column overflow-y-auto" id="analyticsSidebar" style="width: 280px; min-height: 100vh;">
  <div class="p-4 d-flex align-items-center gap-3 border-bottom border-secondary border-opacity-25" style="position: sticky; top: 0; background: #212529; z-index: 10;">
    <div class="bg-info rounded-3 p-2 text-dark">
      <i class="bi bi-bar-chart-line fs-4"></i>
    </div>
    <div>
      <h5 class="fw-bold mb-0 text-white">RNR <span class="text-info">BI</span></h5>
      <span class="small text-muted text-uppercase fw-bold ls-widest" style="font-size: 0.65rem;">Business Intelligence</span>
    </div>
  </div>

  <div class="p-3 flex-grow-1">
    <h6 class="text-muted small text-uppercase fw-bold ls-widest px-3 mb-3">Insights</h6>
    <ul class="nav flex-column gap-1">
      <li class="nav-item">
        <a routerLink="/analytics/executive" routerLinkActive="bg-info text-dark" class="nav-link text-white-50 p-3 rounded-3 d-flex align-items-center gap-3 transition-all hover-white">
          <i class="bi bi-cpu fs-5"></i>
          <span class="fw-bold">Executive Board</span>
        </a>
      </li>
      <li class="nav-item" *ngIf="hasRole('ADMIN') || hasRole('AUDITOR')">
        <a routerLink="/analytics/financial" routerLinkActive="bg-info text-dark" class="nav-link text-white-50 p-3 rounded-3 d-flex align-items-center gap-3 transition-all hover-white">
          <i class="bi bi-cash-coin fs-5"></i>
          <span class="fw-bold">Financial BI</span>
        </a>
      </li>
    </ul>

    <h6 class="text-muted small text-uppercase fw-bold ls-widest px-3 mt-4 mb-3">Core Analytics</h6>
    <ul class="nav flex-column gap-1">
      <li class="nav-item">
        <a routerLink="/analytics/transactions" routerLinkActive="bg-info text-dark" class="nav-link text-white-50 p-3 rounded-3 d-flex align-items-center gap-3 transition-all hover-white">
          <i class="bi bi-arrow-left-right fs-5"></i>
          <span class="fw-bold">Transactions</span>
        </a>
      </li>
      <li class="nav-item">
        <a routerLink="/analytics/customers" routerLinkActive="bg-info text-dark" class="nav-link text-white-50 p-3 rounded-3 d-flex align-items-center gap-3 transition-all hover-white">
          <i class="bi bi-people fs-5"></i>
          <span class="fw-bold">Customers</span>
        </a>
      </li>
      <li class="nav-item">
        <a routerLink="/analytics/branches" routerLinkActive="bg-info text-dark" class="nav-link text-white-50 p-3 rounded-3 d-flex align-items-center gap-3 transition-all hover-white">
          <i class="bi bi-building fs-5"></i>
          <span class="fw-bold">Branches</span>
        </a>
      </li>
       <li class="nav-item" *ngIf="hasRole('ADMIN') || hasRole('HR_OFFICER')">
        <a routerLink="/analytics/employees" routerLinkActive="bg-info text-dark" class="nav-link text-white-50 p-3 rounded-3 d-flex align-items-center gap-3 transition-all hover-white">
          <i class="bi bi-person-badge fs-5"></i>
          <span class="fw-bold">Employees</span>
        </a>
      </li>
    </ul>

    <h6 class="text-muted small text-uppercase fw-bold ls-widest px-3 mt-4 mb-3">Product Analytics</h6>
    <ul class="nav flex-column gap-1">
      <li class="nav-item">
        <a routerLink="/analytics/loans" routerLinkActive="bg-info text-dark" class="nav-link text-white-50 p-3 rounded-3 d-flex align-items-center gap-3 transition-all hover-white">
          <i class="bi bi-piggy-bank fs-5"></i>
          <span class="fw-bold">Loans & Credit</span>
        </a>
      </li>
      <li class="nav-item">
        <a routerLink="/analytics/atm" routerLinkActive="bg-info text-dark" class="nav-link text-white-50 p-3 rounded-3 d-flex align-items-center gap-3 transition-all hover-white">
          <i class="bi bi-atm fs-5"></i>
          <span class="fw-bold">ATM Network</span>
        </a>
      </li>
       <li class="nav-item" *ngIf="hasRole('ADMIN') || hasRole('COMPLIANCE_OFFICER')">
        <a routerLink="/analytics/fraud" routerLinkActive="bg-info text-dark" class="nav-link text-white-50 p-3 rounded-3 d-flex align-items-center gap-3 transition-all hover-white">
          <i class="bi bi-shield-exclamation fs-5"></i>
          <span class="fw-bold">Fraud & Risk</span>
        </a>
      </li>
    </ul>

    <h6 class="text-muted small text-uppercase fw-bold ls-widest px-3 mt-4 mb-3">Reports</h6>
    <ul class="nav flex-column gap-1">
      <li class="nav-item">
        <a routerLink="/analytics/bi" routerLinkActive="bg-info text-dark" class="nav-link text-white-50 p-3 rounded-3 d-flex align-items-center gap-3 transition-all hover-white">
          <i class="bi bi-lightbulb fs-5"></i>
          <span class="fw-bold">KPI Scorecards</span>
        </a>
      </li>
      <li class="nav-item">
        <a routerLink="/analytics/reports" routerLinkActive="bg-info text-dark" class="nav-link text-white-50 p-3 rounded-3 d-flex align-items-center gap-3 transition-all hover-white">
          <i class="bi bi-file-earmark-pdf fs-5"></i>
          <span class="fw-bold">Master Reports</span>
        </a>
      </li>
    </ul>
  </div>

  <div class="p-4 border-top border-secondary border-opacity-25 text-center" style="position: sticky; bottom: 0; background: #212529; z-index: 10;">
     <button class="btn btn-outline-info w-100 rounded-pill fw-bold" (click)="logout()">
       <i class="bi bi-box-arrow-left me-2"></i> Secure Logout
     </button>
  </div>
</div>
