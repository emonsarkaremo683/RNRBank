<div class="row align-items-center mb-5">
  <div class="col-md-8">
    <h2 class="fw-bold text-dark mb-1">Financial Business Intelligence</h2>
    <p class="text-muted small mb-0">Deep-dive into revenue streams, profit margins, and long-term financial stability metrics.</p>
  </div>
</div>

<div class="row g-4 mb-5">
  <div class="col-lg-7">
    <div class="card border-0 shadow-sm rounded-5 p-4 h-100">
      <h5 class="fw-bold text-dark mb-4">Historical Revenue Growth</h5>
      <div style="height: 350px;">
        <canvas baseChart [data]="revenueChartData" [type]="'line'"></canvas>
      </div>
    </div>
  </div>
  <div class="col-lg-5">
    <div class="card border-0 shadow-sm rounded-5 p-4 h-100">
      <h5 class="fw-bold text-dark mb-4">Profitability by Quarter</h5>
      <div style="height: 350px;">
        <canvas baseChart [data]="profitChartData" [type]="'bar'"></canvas>
      </div>
    </div>
  </div>
</div>

<div class="row g-4">
  <div class="col-md-4">
    <div class="card border-0 bg-white shadow-sm rounded-4 p-4">
       <h6 class="text-muted small fw-bold text-uppercase mb-3">Interest Income</h6>
       <h3 class="fw-bold text-dark mb-1">$24.5M</h3>
       <span class="text-success small fw-bold"><i class="bi bi-arrow-up"></i> 5.2%</span>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card border-0 bg-white shadow-sm rounded-4 p-4">
       <h6 class="text-muted small fw-bold text-uppercase mb-3">Fee-based Revenue</h6>
       <h3 class="fw-bold text-dark mb-1">$8.2M</h3>
       <span class="text-success small fw-bold"><i class="bi bi-arrow-up"></i> 12.8%</span>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card border-0 bg-white shadow-sm rounded-4 p-4">
       <h6 class="text-muted small fw-bold text-uppercase mb-3">Operating Expense</h6>
       <h3 class="fw-bold text-dark mb-1">$15.1M</h3>
       <span class="text-danger small fw-bold"><i class="bi bi-arrow-up"></i> 2.4%</span>
    </div>
  </div>
</div>
