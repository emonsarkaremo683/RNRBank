<div class="row align-items-center mb-5">
  <div class="col-md-8">
    <h2 class="fw-bold text-dark mb-1">Fraud & Security Intelligence</h2>
    <p class="text-muted small mb-0">Deep forensic analysis of suspicious activities, AML alert trends, and system-wide risk assessments.</p>
  </div>
</div>

<div class="row g-4 mb-5">
  <div class="col-12">
    <div class="card border-0 shadow-sm rounded-5 p-4 h-100">
      <h5 class="fw-bold text-dark mb-4">Risk Category Distribution</h5>
      <div style="height: 350px;">
        <canvas baseChart [data]="riskChartData" [type]="'bar'"></canvas>
      </div>
    </div>
  </div>
</div>

<div class="row g-4">
  <div class="col-md-3">
    <div class="card border-0 bg-white shadow-sm rounded-4 p-4 text-center">
       <h6 class="text-muted small fw-bold text-uppercase mb-2">Total Alerts (24h)</h6>
       <h3 class="fw-bold text-dark mb-0">145</h3>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card border-0 bg-white shadow-sm rounded-4 p-4 text-center">
       <h6 class="text-muted small fw-bold text-uppercase mb-2">Resolved</h6>
       <h3 class="fw-bold text-success mb-0">132</h3>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card border-0 bg-white shadow-sm rounded-4 p-4 text-center border-start border-5 border-danger">
       <h6 class="text-muted small fw-bold text-uppercase mb-2">Pending Critical</h6>
       <h3 class="fw-bold text-danger mb-0">5</h3>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card border-0 bg-white shadow-sm rounded-4 p-4 text-center">
       <h6 class="text-muted small fw-bold text-uppercase mb-2">IPs Blocked</h6>
       <h3 class="fw-bold text-primary mb-0">18</h3>
    </div>
  </div>
</div>
