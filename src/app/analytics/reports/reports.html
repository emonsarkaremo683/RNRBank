<div class="row align-items-center mb-4">
  <div class="col-md-8">
    <h2 class="fw-bold text-dark mb-1">Master Analytics Reports</h2>
    <p class="text-muted small mb-0">Generate, view, and export high-fidelity banking intelligence reports and regulatory filings.</p>
  </div>
  <div class="col-md-4 text-md-end mt-3 mt-md-0 d-flex gap-2 justify-content-md-end">
    <button class="btn btn-outline-info rounded-pill px-4 fw-bold shadow-sm d-flex align-items-center gap-2 border-info border-opacity-25 text-info">
      <i class="bi bi-file-earmark-excel"></i> Export Excel
    </button>
  </div>
</div>

<div class="row g-4 mb-5">
  <div *ngFor="let rep of analyticsReports" class="col-md-6 col-lg-4">
    <div class="card border-0 shadow-sm rounded-5 h-100 p-4 transition-all hover-translate-y border-bottom border-5 border-info border-opacity-10">
      <div class="d-flex align-items-center justify-content-between mb-3">
        <span [class]="'badge rounded-pill px-3 py-2 small fw-bold ' + 
          (rep.type === 'Financial' ? 'bg-success bg-opacity-10 text-success' : 
           rep.type === 'Security' ? 'bg-danger bg-opacity-10 text-danger' : 
           'bg-info bg-opacity-10 text-info')">
          {{rep.type}}
        </span>
        <span class="small text-muted fw-bold">{{rep.date}}</span>
      </div>
      <h5 class="fw-bold text-dark mb-2">{{rep.title}}</h5>
      <p class="text-muted small mb-4 flex-grow-1">{{rep.desc}}</p>
      
      <div class="d-flex gap-2 mt-auto">
        <button class="btn btn-light rounded-pill fw-bold btn-sm flex-grow-1 border">Preview Board</button>
        <button class="btn btn-info bg-opacity-10 text-info border-0 rounded-circle shadow-sm btn-sm" style="width: 32px; height: 32px;">
          <i class="bi bi-download"></i>
        </button>
      </div>
    </div>
  </div>
</div>
