<div class="row align-items-center mb-5">
  <div class="col-md-8">
    <h2 class="fw-bold text-dark mb-1">ATM Network Performance</h2>
    <p class="text-muted small mb-0">Track real-time network uptime, cash depletion rates, and transaction volume across all global ATM booths.</p>
  </div>
</div>

<div class="row g-4 mb-5">
  <div class="col-12">
    <div class="card border-0 shadow-sm rounded-5 p-4 h-100">
      <h5 class="fw-bold text-dark mb-4">Global Network Uptime (%)</h5>
      <div style="height: 350px;">
        <canvas baseChart [data]="uptimeChartData" [type]="'line'"></canvas>
      </div>
    </div>
  </div>
</div>

<div class="row g-4">
  <div class="col-md-3">
    <div class="card border-0 bg-white shadow-sm rounded-4 p-4 text-center">
       <h6 class="text-muted small fw-bold text-uppercase mb-2">Active Booths</h6>
       <h3 class="fw-bold text-dark mb-0">850</h3>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card border-0 bg-white shadow-sm rounded-4 p-4 text-center">
       <h6 class="text-muted small fw-bold text-uppercase mb-2">Offline Now</h6>
       <h3 class="fw-bold text-danger mb-0">3</h3>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card border-0 bg-white shadow-sm rounded-4 p-4 text-center">
       <h6 class="text-muted small fw-bold text-uppercase mb-2">Refills Today</h6>
       <h3 class="fw-bold text-primary mb-0">42</h3>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card border-0 bg-white shadow-sm rounded-4 p-4 text-center">
       <h6 class="text-muted small fw-bold text-uppercase mb-2">Avg. Wait Time</h6>
       <h3 class="fw-bold text-success mb-0">45s</h3>
    </div>
  </div>
</div>
