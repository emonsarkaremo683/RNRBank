<div class="row align-items-center mb-5">
  <div class="col-md-8">
    <h2 class="fw-bold text-dark mb-1">Credit Portfolio Intelligence</h2>
    <p class="text-muted small mb-0">Analyze loan distribution, track repayment compliance, and monitor credit risk exposure globally.</p>
  </div>
</div>

<div class="row g-4 mb-5">
  <div class="col-lg-5">
    <div class="card border-0 shadow-sm rounded-5 p-4 h-100">
      <h5 class="fw-bold text-dark mb-4">Portfolio by Loan Type</h5>
      <div style="height: 300px;">
        <canvas baseChart [data]="loanTypeData" [type]="'doughnut'"></canvas>
      </div>
    </div>
  </div>
  <div class="col-lg-7">
    <div class="card border-0 shadow-sm rounded-5 p-4 h-100">
      <h5 class="fw-bold text-dark mb-4">EMI Repayment Rate Trend</h5>
      <div style="height: 300px;">
        <canvas baseChart [data]="repaymentData" [type]="'line'"></canvas>
      </div>
    </div>
  </div>
</div>

<div class="row g-4">
  <div class="col-md-3">
    <div class="card border-0 bg-white shadow-sm rounded-4 p-4 text-center">
       <h6 class="text-muted small fw-bold text-uppercase mb-2">Total Disbursed</h6>
       <h3 class="fw-bold text-dark mb-0">$1.25B</h3>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card border-0 bg-white shadow-sm rounded-4 p-4 text-center border-start border-5 border-danger">
       <h6 class="text-muted small fw-bold text-uppercase mb-2">Non-Performing (NPL)</h6>
       <h3 class="fw-bold text-danger mb-0">1.8%</h3>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card border-0 bg-white shadow-sm rounded-4 p-4 text-center">
       <h6 class="text-muted small fw-bold text-uppercase mb-2">Recovery Rate</h6>
       <h3 class="fw-bold text-success mb-0">98.2%</h3>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card border-0 bg-white shadow-sm rounded-4 p-4 text-center">
       <h6 class="text-muted small fw-bold text-uppercase mb-2">Active Apps</h6>
       <h3 class="fw-bold text-primary mb-0">1,240</h3>
    </div>
  </div>
</div>
