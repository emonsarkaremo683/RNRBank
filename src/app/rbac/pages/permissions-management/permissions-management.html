<div class="permissions-header d-flex justify-content-between align-items-center mb-5">
  <div>
    <h2 class="fw-bold text-dark mb-1">Permissions Management</h2>
    <p class="text-muted small mb-0">Manage system-wide permissions and categorize access levels.</p>
  </div>
  <button class="btn btn-primary rounded-pill px-4 fw-bold shadow-sm d-flex align-items-center gap-2" (click)="openCreateModal()">
    <i class="bi bi-plus-lg"></i> Add Permission
  </button>
</div>

<div class="card border-0 shadow-sm rounded-5 overflow-hidden">
  <div class="card-header bg-white py-4 px-4 border-0 border-bottom">
    <div class="row align-items-center">
      <div class="col-md-5">
        <div class="input-group">
          <span class="input-group-text bg-light border-0"><i class="bi bi-search text-muted"></i></span>
          <input type="text" class="form-control bg-light border-0" placeholder="Search permissions...">
        </div>
      </div>
      <div class="col-md-4 ms-auto">
        <select class="form-select bg-light border-0" (change)="filterByModule($event)">
          <option value="">All Modules</option>
          <option value="ACCOUNTS">Accounts</option>
          <option value="TRANSACTIONS">Transactions</option>
          <option value="KYC">KYC</option>
          <option value="HR">HR</option>
          <option value="REPORTS">Reports</option>
        </select>
      </div>
    </div>
  </div>
  
  <div class="table-responsive">
    <table class="table table-hover align-middle mb-0">
      <thead class="bg-light text-muted small text-uppercase ls-widest">
        <tr>
          <th class="ps-4 py-3">Module</th>
          <th class="py-3">Permission Name</th>
          <th class="py-3">System Code</th>
          <th class="py-3 text-end pe-4">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let perm of permissions()">
          <td class="ps-4">
            <span class="badge bg-primary bg-opacity-10 text-primary px-3 py-2 rounded-pill fw-bold">
              {{perm.module}}
            </span>
          </td>
          <td>
            <div class="fw-bold text-dark">{{perm.name}}</div>
            <div class="small text-muted">{{perm.description || 'System permission'}}</div>
          </td>
          <td><code class="text-danger fw-bold bg-light px-2 py-1 rounded">{{perm.code}}</code></td>
          <td class="text-end pe-4">
            <div class="d-flex justify-content-end gap-2">
              <button class="btn btn-light btn-sm rounded-circle shadow-sm" (click)="editPermission(perm)">
                <i class="bi bi-pencil-square text-primary"></i>
              </button>
              <button class="btn btn-light btn-sm rounded-circle shadow-sm" (click)="deletePermission(perm.id)">
                <i class="bi bi-trash text-danger"></i>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
