<div class="row align-items-center mb-4">
  <div class="col-md-8">
    <h2 class="fw-bold text-dark mb-1">Global IP Intelligence</h2>
    <p class="text-muted small mb-0">Monitor system access origins, manage blacklists, and track suspicious network behavior.</p>
  </div>
  <div class="col-md-4 text-md-end mt-3 mt-md-0 d-flex gap-2 justify-content-md-end">
    <button class="btn btn-dark rounded-pill px-4 fw-bold shadow-sm d-flex align-items-center gap-2">
      <i class="bi bi-shield-slash"></i> Blacklist IP
    </button>
  </div>
</div>

<div class="row g-4">
  <div *ngFor="let ip of ips" class="col-md-6 col-xl-4">
    <div class="card border-0 shadow-sm rounded-5 h-100 overflow-hidden transition-all hover-translate-y">
      <div class="card-body p-4">
        <div class="d-flex justify-content-between align-items-start mb-4">
          <div class="d-flex align-items-center gap-3">
            <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex align-items-center justify-content-center fs-4" style="width: 50px; height: 50px;">
              <i class="bi bi-globe"></i>
            </div>
            <div>
              <h6 class="fw-bold text-dark mb-1 font-monospace">{{ip.ipAddress}}</h6>
              <span class="text-muted small">{{ip.location}}</span>
            </div>
          </div>
          <span [class]="'badge rounded-pill px-3 py-2 small fw-bold ' + (ip.status === 'whitelisted' ? 'bg-success bg-opacity-10 text-success' : 'bg-danger bg-opacity-10 text-danger')">
            {{ip.status | titlecase}}
          </span>
        </div>
        
        <div class="bg-light rounded-4 p-3 mb-4">
          <div class="d-flex justify-content-between">
            <span class="small text-muted fw-bold">Last Active</span>
            <span class="small fw-bold text-dark">{{ip.lastSeen | date:'medium'}}</span>
          </div>
        </div>
        
        <div class="d-flex gap-2">
          <button class="btn btn-light btn-sm rounded-pill flex-grow-1 fw-bold border">Activity Log</button>
          <button class="btn btn-outline-danger btn-sm rounded-circle shadow-sm border-0" *ngIf="ip.status === 'whitelisted'"><i class="bi bi-shield-x"></i></button>
        </div>
      </div>
    </div>
  </div>
</div>
