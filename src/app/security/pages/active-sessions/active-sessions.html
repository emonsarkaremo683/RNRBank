<div class="sessions-header mb-5">
  <h2 class="fw-bold text-dark mb-1">Active Sessions</h2>
  <p class="text-muted small">Monitor and manage all devices currently logged into your account.</p>
</div>

<div class="row g-4">
  <div *ngFor="let session of sessions" class="col-md-6">
    <div class="card border-0 shadow-sm rounded-5 p-4 position-relative" [class.border-start]="session.isCurrent" [style.border-left-width]="session.isCurrent ? '5px' : '0'" [style.border-left-color]="session.isCurrent ? '#0a192f' : 'transparent'">
      <div *ngIf="session.isCurrent" class="position-absolute top-0 end-0 mt-3 me-3">
        <span class="badge bg-success rounded-pill px-3 py-2 small">Current Session</span>
      </div>
      
      <div class="d-flex align-items-start gap-4">
        <div [class]="'bg-light rounded-4 p-3 d-flex align-items-center justify-content-center ' + (session.isCurrent ? 'text-primary' : 'text-secondary')" style="width: 60px; height: 60px;">
          <i [class]="'bi ' + getDeviceIcon(session.device) + ' fs-3'"></i>
        </div>
        
        <div class="flex-grow-1">
          <h5 class="fw-bold mb-1">{{session.browser}} on {{session.device}}</h5>
          <p class="small text-muted mb-3">{{session.location}} • <code class="text-primary">{{session.ipAddress}}</code></p>
          
          <div class="d-flex align-items-center gap-2 mb-4">
            <i class="bi bi-clock small text-muted"></i>
            <span class="small text-muted">Last active: {{session.lastActive | date:'medium'}}</span>
          </div>
          
          <button 
            *ngIf="!session.isCurrent" 
            class="btn btn-light btn-sm rounded-pill px-4 fw-bold text-danger border"
            (click)="logoutSession(session.id)"
          >
            Logout Device
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="mt-5 text-center">
  <button class="btn btn-outline-dark rounded-pill px-5 py-3 fw-bold shadow-sm">
    <i class="bi bi-box-arrow-right me-2"></i> Logout From All Other Devices
  </button>
</div>
