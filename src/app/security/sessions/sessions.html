<div class="row align-items-center mb-4">
  <div class="col-md-8">
    <h2 class="fw-bold text-dark mb-1">Global Active Sessions</h2>
    <p class="text-muted small mb-0">Live monitoring of all user sessions, concurrent login tracking, and remote termination capabilities.</p>
  </div>
</div>

<div class="row g-4">
  <div *ngFor="let s of sessions" class="col-md-6 col-lg-4">
    <div class="card border-0 shadow-sm rounded-5 h-100 overflow-hidden transition-all hover-translate-y">
      <div class="card-body p-4">
        <div class="d-flex justify-content-between align-items-start mb-4">
          <div class="d-flex align-items-center gap-3">
             <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex align-items-center justify-content-center fs-4" style="width: 50px; height: 50px;">
              <i [class]="'bi ' + (s.device.includes('iPhone') ? 'bi-phone' : 'bi-laptop')"></i>
            </div>
            <div>
              <h6 class="fw-bold text-dark mb-1">{{s.device}}</h6>
              <span class="text-muted small fw-bold">{{s.userId}}</span>
            </div>
          </div>
          <span [class]="'badge rounded-pill px-3 py-2 small fw-bold ' + (s.status === 'active' ? 'bg-success bg-opacity-10 text-success' : 'bg-warning bg-opacity-10 text-warning')">
            {{s.status | uppercase}}
          </span>
        </div>
        
        <div class="bg-light rounded-4 p-3 mb-4 small">
          <div class="d-flex justify-content-between mb-2">
            <span class="text-muted fw-bold">IP Address</span>
            <code class="text-primary fw-bold">{{s.ip}}</code>
          </div>
          <div class="d-flex justify-content-between mb-2">
            <span class="text-muted fw-bold">Browser</span>
            <span class="text-dark fw-bold">{{s.browser}}</span>
          </div>
           <div class="d-flex justify-content-between">
            <span class="text-muted fw-bold">Last Active</span>
            <span class="text-dark fw-bold">{{s.lastActive | date:'shortTime'}}</span>
          </div>
        </div>
        
        <button class="btn btn-outline-danger w-100 rounded-pill fw-bold border" (click)="terminateSession(s.id)">Terminate Session</button>
      </div>
    </div>
  </div>
</div>
