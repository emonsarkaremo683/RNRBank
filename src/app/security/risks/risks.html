<div class="row align-items-center mb-4">
  <div class="col-md-8">
    <h2 class="fw-bold text-dark mb-1">Risk Analytics Hub</h2>
    <p class="text-muted small mb-0">Customer risk scoring, transaction risk profiling, and branch-level security vulnerability analysis.</p>
  </div>
</div>

<div class="row g-4">
  <div *ngFor="let risk of riskProfiles" class="col-md-6 col-lg-4">
    <div class="card border-0 shadow-sm rounded-5 h-100 overflow-hidden transition-all hover-translate-y">
      <div class="card-body p-4">
        <div class="d-flex justify-content-between align-items-start mb-4">
          <div class="d-flex align-items-center gap-3">
            <div [class]="'rounded-circle d-flex align-items-center justify-content-center fw-bold fs-4 ' + (risk.level === 'low' ? 'bg-success bg-opacity-10 text-success' : 'bg-danger bg-opacity-10 text-danger')" style="width: 50px; height: 50px;">
              {{risk.score}}
            </div>
            <div>
              <h6 class="fw-bold text-dark mb-1">{{risk.entityId}}</h6>
              <span class="text-muted small text-uppercase fw-bold">{{risk.entityType}}</span>
            </div>
          </div>
          <span [class]="'badge rounded-pill px-3 py-2 small fw-bold ' + (risk.level === 'low' ? 'bg-success text-white' : 'bg-danger text-white')">
            {{risk.level | uppercase}} RISK
          </span>
        </div>
        
        <div class="progress mb-4" style="height: 10px;">
          <div [class]="'progress-bar ' + (risk.level === 'low' ? 'bg-success' : 'bg-danger')" role="progressbar" [style.width.%]="risk.score"></div>
        </div>
        
        <div class="d-flex gap-2">
          <button class="btn btn-light btn-sm rounded-pill flex-grow-1 fw-bold border">Detailed Report</button>
          <button class="btn btn-outline-primary btn-sm rounded-circle shadow-sm border-0"><i class="bi bi-graph-up"></i></button>
        </div>
      </div>
    </div>
  </div>
</div>
