<!-- Page Header -->
<section class="bg-primary text-white py-5">
  <div class="container py-lg-4 text-center">
    <h1 class="display-4 fw-bold mb-3">News & Financial Insights</h1>
    <p class="lead opacity-75 mx-auto" style="max-width: 700px;">Stay updated with the latest banking news, market trends, and financial tips from RNR Bank.</p>
  </div>
</section>

<!-- News Filter & Search -->
<section class="py-5 bg-light border-bottom">
  <div class="container">
    <div class="row g-3 align-items-center">
      <div class="col-md-8">
        <div class="d-flex flex-wrap gap-2">
          <button class="btn btn-primary rounded-pill px-4 fw-bold shadow-sm">All News</button>
          <button class="btn btn-white bg-white border-0 rounded-pill px-4 shadow-sm">Banking</button>
          <button class="btn btn-white bg-white border-0 rounded-pill px-4 shadow-sm">Investment</button>
          <button class="btn btn-white bg-white border-0 rounded-pill px-4 shadow-sm">Security</button>
          <button class="btn btn-white bg-white border-0 rounded-pill px-4 shadow-sm">Corporate</button>
        </div>
      </div>
      <div class="col-md-4">
        <div class="input-group shadow-sm">
          <span class="input-group-text bg-white border-0"><i class="bi bi-search text-secondary"></i></span>
          <input type="text" class="form-control border-0 py-2" placeholder="Search articles...">
        </div>
      </div>
    </div>
  </div>
</section>

<!-- News Grid -->
<section class="py-5">
  <div class="container py-lg-5">
    <div class="row g-4">
      <div *ngFor="let news of newsItems" class="col-md-6 col-lg-4">
        <div class="card h-100 border-0 shadow-sm rounded-5 overflow-hidden hover-translate-y transition-all">
          <img [src]="news.imageUrl" class="card-img-top" [alt]="news.title" style="height: 200px; object-fit: cover;">
          <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <span class="badge bg-primary bg-opacity-10 text-primary px-3 py-2 rounded-pill small fw-bold">{{news.category}}</span>
              <span class="small text-secondary">{{news.date}}</span>
            </div>
            <h5 class="fw-bold mb-3">{{news.title}}</h5>
            <p class="text-secondary small mb-4">{{news.summary}}</p>
            <a href="#" class="text-primary fw-bold text-decoration-none d-flex align-items-center">
              Read More <i class="bi bi-arrow-right ms-2"></i>
            </a>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Pagination -->
    <div class="mt-5 d-flex justify-content-center">
      <nav aria-label="Page navigation">
        <ul class="pagination pagination-lg">
          <li class="page-item disabled">
            <a class="page-link rounded-start-pill border-0 shadow-sm px-4" href="#" tabindex="-1">Previous</a>
          </li>
          <li class="page-item active"><a class="page-link border-0 shadow-sm px-4" href="#">1</a></li>
          <li class="page-item"><a class="page-link border-0 shadow-sm px-4" href="#">2</a></li>
          <li class="page-item"><a class="page-link border-0 shadow-sm px-4" href="#">3</a></li>
          <li class="page-item">
            <a class="page-link rounded-end-pill border-0 shadow-sm px-4" href="#">Next</a>
          </li>
        </ul>
      </nav>
    </div>
  </div>
</section>
