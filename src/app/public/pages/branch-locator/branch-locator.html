<!-- Page Header -->
<section class="bg-primary text-white py-5">
  <div class="container py-lg-4 text-center">
    <h1 class="display-4 fw-bold mb-3">Branch & ATM Locator</h1>
    <p class="lead opacity-75 mx-auto" style="max-width: 700px;">Find your nearest RNR Bank branch or ATM with ease. We have over 5,000 locations worldwide to serve you better.</p>
  </div>
</section>

<!-- Search Section -->
<section class="py-5 bg-light border-bottom">
  <div class="container">
    <div class="bg-white p-4 rounded-5 shadow-sm">
      <div class="row g-3">
        <div class="col-md-5">
          <div class="input-group">
            <span class="input-group-text bg-light border-0"><i class="bi bi-geo-alt text-primary"></i></span>
            <input type="text" class="form-control bg-light border-0 py-3" placeholder="Enter City, ZIP, or Address">
          </div>
        </div>
        <div class="col-md-4">
          <select class="form-select bg-light border-0 py-3">
            <option selected>All Locations</option>
            <option>Branches Only</option>
            <option>ATMs Only</option>
            <option>24/7 Service Centers</option>
          </select>
        </div>
        <div class="col-md-3">
          <button class="btn btn-primary w-100 py-3 rounded-pill fw-bold shadow-sm">Search Locations</button>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Locations Content -->
<section class="py-5">
  <div class="container py-lg-4">
    <div class="row g-4">
      <!-- Location Cards -->
      <div class="col-lg-5">
        <div class="d-flex flex-column gap-4 overflow-auto pe-2" style="max-height: 800px;">
          <div *ngFor="let loc of locations" class="card border-0 shadow-sm rounded-4 hover-translate-y transition-all cursor-pointer">
            <div class="card-body p-4">
              <div class="d-flex justify-content-between align-items-start mb-3">
                <span [class]="'badge px-3 py-2 rounded-pill ' + (loc.type === 'Branch' ? 'bg-primary text-white' : 'bg-warning text-dark')">{{loc.type}}</span>
                <span class="small text-success fw-bold"><i class="bi bi-circle-fill me-1 small"></i> Open Now</span>
              </div>
              <h5 class="fw-bold mb-2">{{loc.name}}</h5>
              <p class="text-secondary small mb-3"><i class="bi bi-geo-alt me-2"></i> {{loc.address}}</p>
              <div class="d-flex gap-4 small text-secondary mb-4">
                <span><i class="bi bi-telephone me-1"></i> {{loc.phone}}</span>
                <span><i class="bi bi-clock me-1"></i> {{loc.hours}}</span>
              </div>
              <div class="d-flex gap-2">
                <button class="btn btn-light btn-sm rounded-pill px-3 flex-grow-1">Get Directions</button>
                <button class="btn btn-outline-primary btn-sm rounded-pill px-3 flex-grow-1">View Details</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- Map Placeholder -->
      <div class="col-lg-7">
        <div class="bg-light rounded-5 h-100 shadow-inner d-flex align-items-center justify-content-center overflow-hidden position-relative" style="min-height: 500px;">
          <img src="https://images.unsplash.com/photo-1524661135-423995f22d0b?auto=format&fit=crop&q=80&w=1200" alt="Map Placeholder" class="img-fluid w-100 h-100 object-fit-cover opacity-50">
          <div class="position-absolute text-center bg-white p-4 rounded-4 shadow-lg border border-primary border-3" style="z-index: 5;">
            <i class="bi bi-map text-primary" style="font-size: 3rem;"></i>
            <h5 class="fw-bold mt-3 mb-0">Interactive Map</h5>
            <p class="text-secondary small">Click a location to see on map</p>
          </div>
          <!-- Decorative Markers -->
          <i class="bi bi-geo-alt-fill text-primary position-absolute fs-1" style="top: 20%; left: 30%;"></i>
          <i class="bi bi-geo-alt-fill text-warning position-absolute fs-1" style="top: 50%; left: 60%;"></i>
          <i class="bi bi-geo-alt-fill text-primary position-absolute fs-1" style="top: 70%; left: 40%;"></i>
        </div>
      </div>
    </div>
  </div>
</section>
