<div class="reset-header mb-5 text-center text-lg-start">
  <h2 class="fw-bold text-dark mb-2">Reset Password</h2>
  <p class="text-muted">Enter your new secure password to regain access.</p>
</div>

<form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="reset-form">
  <div class="mb-4">
    <label class="form-label small fw-bold text-uppercase ls-widest text-muted">New Password</label>
    <div class="input-group input-group-lg">
      <span class="input-group-text bg-light border-0"><i class="bi bi-shield-lock text-primary"></i></span>
      <input 
        [type]="showPassword ? 'text' : 'password'" 
        formControlName="password" 
        class="form-control bg-light border-0" 
        placeholder="••••••••"
      >
      <button class="btn btn-light border-0" type="button" (click)="togglePassword()">
        <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
      </button>
    </div>
  </div>

  <div class="mb-5">
    <label class="form-label small fw-bold text-uppercase ls-widest text-muted">Confirm New Password</label>
    <div class="input-group input-group-lg">
      <span class="input-group-text bg-light border-0"><i class="bi bi-lock-check text-primary"></i></span>
      <input type="password" formControlName="confirmPassword" class="form-control bg-light border-0" placeholder="••••••••">
    </div>
    <div *ngIf="resetForm.errors?.['mismatch'] && resetForm.get('confirmPassword')?.touched" class="text-danger small mt-1">
      Passwords do not match.
    </div>
  </div>

  <button 
    type="submit" 
    class="btn btn-primary btn-lg w-100 rounded-pill fw-bold py-3 shadow-lg"
    [disabled]="resetForm.invalid || isLoading"
  >
    <span *ngIf="!isLoading">Update Password</span>
    <div *ngIf="isLoading" class="spinner-border spinner-border-sm text-white" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </button>
</form>
