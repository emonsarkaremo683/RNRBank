<div class="forgot-header mb-5 text-center text-lg-start">
  <h2 class="fw-bold text-dark mb-2">Forgot Password?</h2>
  <p class="text-muted">No worries, we'll send you instructions to reset your password.</p>
</div>

<form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="forgot-form">
  <div class="mb-5">
    <label class="form-label small fw-bold text-uppercase ls-widest text-muted">Email Address</label>
    <div class="input-group input-group-lg">
      <span class="input-group-text bg-light border-0"><i class="bi bi-envelope text-primary"></i></span>
      <input type="email" formControlName="email" class="form-control bg-light border-0" placeholder="name@example.com">
    </div>
  </div>

  <button 
    type="submit" 
    class="btn btn-primary btn-lg w-100 rounded-pill fw-bold py-3 shadow-lg"
    [disabled]="forgotForm.invalid || isLoading"
  >
    <span *ngIf="!isLoading">Send Reset Link</span>
    <div *ngIf="isLoading" class="spinner-border spinner-border-sm text-white" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </button>

  <div class="mt-5 text-center">
    <a routerLink="/auth/login" class="text-decoration-none small fw-bold text-primary d-flex align-items-center justify-content-center gap-2">
      <i class="bi bi-arrow-left"></i> Back to Login
    </a>
  </div>
</form>
