<div class="text-center">
  <div class="bg-primary bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center mb-4" style="width: 100px; height: 100px;">
    <i class="bi bi-envelope-check text-primary display-4"></i>
  </div>
  <h2 class="fw-bold mb-3">Check Your Email</h2>
  <p class="text-secondary mb-5">We've sent a verification link to your email address. Please click the link to verify your account.</p>
  
  <div class="bg-light p-4 rounded-4 mb-5 border-start border-5 border-primary text-start">
    <h6 class="fw-bold mb-2">Didn't receive the email?</h6>
    <ul class="small text-secondary mb-0">
      <li>Check your spam or junk folder.</li>
      <li>Ensure the email address provided is correct.</li>
      <li>Wait for 2-3 minutes.</li>
    </ul>
  </div>

  <button class="btn btn-primary btn-lg w-100 rounded-pill fw-bold py-3 shadow mb-4">Resend Verification Email</button>
  
  <a routerLink="/auth/login" class="fw-bold text-decoration-none small">Back to Login</a>
</div>
