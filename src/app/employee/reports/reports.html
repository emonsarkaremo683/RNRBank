<div class="row align-items-center mb-4">
  <div class="col-md-8">
    <h2 class="fw-bold text-dark mb-1">Branch Reports & Analytics</h2>
    <p class="text-muted small mb-0">Generate and download standard banking operations reports.</p>
  </div>
</div>

<div class="row g-4">
  <div *ngFor="let rep of reportsList" class="col-md-6 col-lg-4">
    <div class="card border-0 shadow-sm rounded-5 h-100 p-4 transition-all hover-translate-y">
      <div class="d-flex align-items-center justify-content-between mb-3">
        <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex align-items-center justify-content-center" style="width: 50px; height: 50px;">
          <i class="bi bi-file-earmark-bar-graph fs-4"></i>
        </div>
        <span class="badge bg-light text-dark rounded-pill border">{{rep.date}}</span>
      </div>
      <h5 class="fw-bold text-dark mb-2">{{rep.title}}</h5>
      <p class="text-muted small mb-4 flex-grow-1">{{rep.desc}}</p>
      
      <div class="d-flex gap-2 mt-auto">
        <button class="btn btn-outline-primary rounded-pill fw-bold btn-sm flex-grow-1">Preview</button>
        <button class="btn btn-primary rounded-circle shadow-sm border-0 btn-sm" style="width: 32px; height: 32px;">
          <i class="bi bi-download"></i>
        </button>
      </div>
    </div>
  </div>
</div>
