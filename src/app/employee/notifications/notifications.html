<div class="row align-items-center mb-5">
  <div class="col-md-8">
    <h2 class="fw-bold text-dark mb-1">Staff Internal Notifications</h2>
    <p class="text-muted small mb-0">Stay updated with internal memos, branch alerts, and system maintenance schedules.</p>
  </div>
</div>

<div class="card border-0 shadow-sm rounded-5 overflow-hidden">
  <div class="list-group list-group-flush">
    <div *ngFor="let n of staffNotifications()" class="list-group-item p-4 border-bottom border-secondary border-opacity-10 position-relative">
      <div class="d-flex gap-4 align-items-start">
         <div [class]="'rounded-circle d-flex align-items-center justify-content-center ' + 
          (n.type === 'urgent' ? 'bg-danger bg-opacity-10 text-danger' : 
           n.type === 'meeting' ? 'bg-success bg-opacity-10 text-success' : 'bg-primary bg-opacity-10 text-primary')" style="width: 50px; height: 50px; flex-shrink: 0;">
          <i [class]="'bi fs-4 ' + (n.type === 'urgent' ? 'bi-exclamation-octagon' : n.type === 'meeting' ? 'bi-calendar2-event' : 'bi-info-circle')"></i>
        </div>
        <div class="flex-grow-1">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <h6 class="fw-bold text-dark mb-0">{{n.title}}</h6>
            <span class="small text-muted fw-bold">{{(n.createdAt || n.time) | date:'short'}}</span>
          </div>
          <p class="small text-muted mb-0">{{n.message}}</p>
        </div>
      </div>
    </div>
    <div *ngIf="staffNotifications().length === 0" class="text-center py-5 text-muted small">No notifications found.</div>
  </div>
</div>
