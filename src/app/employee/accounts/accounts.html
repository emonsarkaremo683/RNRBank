<div class="row align-items-center mb-4">
  <div class="col-md-8">
    <h2 class="fw-bold text-dark mb-1">Account Management</h2>
    <p class="text-muted small mb-0">View all branch accounts, balances, and account statuses.</p>
  </div>
  <div class="col-md-4 text-md-end mt-3 mt-md-0">
    <button class="btn btn-primary rounded-pill px-4 fw-bold shadow-sm d-flex align-items-center gap-2 ms-auto" (click)="showOpenModal.set(true)">
      <i class="bi bi-plus-lg"></i> Open Account
    </button>
  </div>
</div>

<!-- Open Account Modal -->
<div class="modal fade show d-block" *ngIf="showOpenModal()" tabindex="-1" style="background: rgba(0,0,0,0.5); z-index: 1050;">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg rounded-5">
      <div class="modal-header border-0 p-4 pb-0">
        <h5 class="fw-bold mb-0">Open New Bank Account</h5>
        <button type="button" class="btn-close" (click)="showOpenModal.set(false)"></button>
      </div>
      <div class="modal-body p-4">
        <form #accForm="ngForm" (ngSubmit)="onOpenAccount(accForm.value)">
          <div class="mb-3">
            <label class="form-label small fw-bold text-muted text-uppercase">Customer Name</label>
            <input type="text" name="customerName" ngModel class="form-control bg-light border-0 py-2 rounded-3" placeholder="Full Name" required>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold text-muted text-uppercase">Account Type</label>
            <select name="type" ngModel class="form-select bg-light border-0 py-2 rounded-3" required>
              <option value="Savings">Savings Account</option>
              <option value="Current">Current Account</option>
              <option value="Business">Business Account</option>
            </select>
          </div>
          <div class="mb-4">
            <label class="form-label small fw-bold text-muted text-uppercase">Initial Deposit (USD)</label>
            <input type="number" name="initialDeposit" ngModel class="form-control bg-light border-0 py-2 rounded-3" placeholder="0.00" required>
          </div>
          <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill fw-bold py-3 shadow" [disabled]="accForm.invalid || isSubmitting()">
            {{ isSubmitting() ? 'Processing...' : 'Confirm and Open' }}
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<div class="card border-0 shadow-sm rounded-5 overflow-hidden mb-4">
  <div class="card-header bg-white py-4 px-4 border-0 border-bottom d-flex justify-content-between align-items-center">
    <div class="input-group w-50">
      <span class="input-group-text bg-light border-0"><i class="bi bi-search text-muted"></i></span>
      <input type="text" class="form-control bg-light border-0" placeholder="Search by Account No or Customer Name...">
    </div>
  </div>
  <div class="table-responsive">
    <table class="table table-hover align-middle mb-0">
      <thead class="bg-light text-muted small text-uppercase ls-widest">
        <tr>
          <th class="ps-4 py-3 border-0">Account No.</th>
          <th class="py-3 border-0">Customer</th>
          <th class="py-3 border-0">Type</th>
          <th class="py-3 border-0">Balance</th>
          <th class="py-3 border-0">Status</th>
          <th class="py-3 text-end pe-4 border-0">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let acc of accounts()">
          <td class="ps-4 py-3">
            <h6 class="fw-bold text-primary font-monospace mb-0">{{acc.id}}</h6>
          </td>
          <td><span class="small fw-bold text-dark">{{acc.customerName}}</span></td>
          <td><span class="badge bg-light text-dark border rounded-pill px-3 py-2 small fw-bold">{{acc.type}}</span></td>
          <td><span class="fw-bold text-dark">${{acc.balance | number:'1.2-2'}}</span></td>
          <td>
            <div class="dropdown">
              <span [class]="'badge rounded-pill px-3 py-2 small cursor-pointer ' + (acc.status === 'active' ? 'bg-success bg-opacity-10 text-success' : 'bg-warning bg-opacity-10 text-warning')" data-bs-toggle="dropdown">
                {{acc.status | titlecase}}
              </span>
              <ul class="dropdown-menu shadow border-0 rounded-3">
                <li><button class="dropdown-item small fw-bold" (click)="updateStatus(acc.id, 'active')">Active</button></li>
                <li><button class="dropdown-item small fw-bold" (click)="updateStatus(acc.id, 'frozen')">Freeze</button></li>
                <li><button class="dropdown-item small fw-bold text-danger" (click)="updateStatus(acc.id, 'closed')">Close</button></li>
              </ul>
            </div>
          </td>
          <td class="text-end pe-4">
            <button class="btn btn-light btn-sm rounded-pill fw-bold text-primary shadow-sm px-3">Details</button>
          </td>
        </tr>
        <tr *ngIf="accounts().length === 0">
           <td colspan="6" class="text-center py-5 text-muted small">No accounts found in this branch.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
