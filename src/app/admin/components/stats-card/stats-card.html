<div class="card border-0 shadow-sm rounded-4 p-4 h-100 transition-all hover-translate-y">
  <div class="d-flex align-items-center justify-content-between mb-4">
    <div [class]="'bg-' + color + ' bg-opacity-10 text-' + color + ' rounded-4 p-3'">
      <i [class]="'bi ' + icon + ' fs-4'"></i>
    </div>
    <div [class]="'small fw-bold ' + (trend > 0 ? 'text-success' : 'text-danger')">
      <i [class]="'bi ' + (trend > 0 ? 'bi-graph-up-arrow' : 'bi-graph-down-arrow') + ' me-1'"></i>
      {{trend}}%
    </div>
  </div>
  <h6 class="text-muted small text-uppercase fw-bold ls-widest mb-1">{{title}}</h6>
  <h2 class="fw-bold text-dark mb-0">{{prefix}}{{value | number}}{{suffix}}</h2>
</div>
