<div class="atm-page">
  <div class="row align-items-center mb-5">
    <div class="col-md-8">
      <h2 class="fw-bold text-dark mb-1">ATM Management</h2>
      <p class="text-muted small mb-0">Manage global ATM booths and their statuses.</p>
    </div>
    <div class="col-md-4 text-md-end">
      <button class="btn btn-primary rounded-pill px-4 fw-bold shadow-sm" (click)="toggleForm()">
        <i class="bi bi-plus-lg me-2"></i> {{ showForm ? 'Cancel' : 'Add New ATM' }}
      </button>
    </div>
  </div>

  <div *ngIf="showForm" class="card border-0 shadow-sm rounded-5 mb-5 p-4">
    <h5 class="fw-bold mb-4">Add New ATM Booth</h5>
    <form [formGroup]="atmForm" (ngSubmit)="onSubmit()">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label small fw-bold">ATM Name</label>
          <input type="text" formControlName="name" class="form-control bg-light border-0">
        </div>
        <div class="col-md-5">
          <label class="form-label small fw-bold">Address</label>
          <input type="text" formControlName="address" class="form-control bg-light border-0">
        </div>
        <div class="col-md-3 d-flex align-items-end">
          <button type="submit" class="btn btn-primary w-100 rounded-pill fw-bold" [disabled]="atmForm.invalid || isLoading">
            Save ATM
          </button>
        </div>
      </div>
    </form>
  </div>

  <div class="row g-4">
    <div *ngFor="let atm of atms()" class="col-md-6 col-lg-4">
      <div class="card border-0 shadow-sm rounded-5 h-100 overflow-hidden transition-all hover-translate-y">
        <div class="card-header bg-dark text-white border-0 p-4 d-flex justify-content-between align-items-center">
          <span class="badge bg-light text-dark rounded-pill px-3 py-2 small fw-bold">{{atm.id}}</span>
          <span [class]="'badge rounded-pill px-3 py-2 small ' + (atm.status === 'active' ? 'bg-success' : 'bg-danger')">
            {{atm.status | titlecase}}
          </span>
        </div>
        <div class="card-body p-4">
          <h5 class="fw-bold text-dark mb-3">{{atm.name}}</h5>
          <div class="d-flex flex-column gap-3 mb-4">
            <div class="d-flex align-items-start gap-3 small text-muted">
              <i class="bi bi-geo-alt text-primary"></i>
              <span>{{atm.address}}</span>
            </div>
            <div class="d-flex align-items-center gap-3 small text-muted">
              <i class="bi bi-hdd-network text-primary"></i>
              <span>Features: <span class="badge bg-light text-dark mx-1" *ngFor="let f of atm.features">{{f}}</span></span>
            </div>
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-outline-primary btn-sm rounded-pill flex-grow-1 fw-bold">Manage</button>
            <button class="btn btn-light btn-sm rounded-circle shadow-sm"><i class="bi bi-trash text-danger"></i></button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
