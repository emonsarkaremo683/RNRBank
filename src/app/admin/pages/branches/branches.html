<div class="branches-page">
  <div class="row align-items-center mb-5">
    <div class="col-md-8">
      <h2 class="fw-bold text-dark mb-1">Branch Management</h2>
      <p class="text-muted small mb-0">Monitor branch performance, assign managers, and manage global locations.</p>
    </div>
    <div class="col-md-4 text-md-end">
      <button class="btn btn-primary rounded-pill px-4 fw-bold shadow-sm" (click)="toggleForm()">
        <i class="bi bi-plus-lg me-2"></i> {{ showForm ? 'Cancel' : 'Add New Branch' }}
      </button>
    </div>
  </div>

  <div *ngIf="showForm" class="card border-0 shadow-sm rounded-5 mb-5 p-4">
    <h5 class="fw-bold mb-4">Add New Branch</h5>
    <form [formGroup]="branchForm" (ngSubmit)="onSubmit()">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label small fw-bold">Branch Code</label>
          <input type="text" formControlName="branchCode" class="form-control bg-light border-0">
        </div>
        <div class="col-md-4">
          <label class="form-label small fw-bold">Branch Name</label>
          <input type="text" formControlName="branchName" class="form-control bg-light border-0">
        </div>
        <div class="col-md-4">
          <label class="form-label small fw-bold">Routing Number</label>
          <input type="text" formControlName="routingNumber" class="form-control bg-light border-0">
        </div>
        <div class="col-md-4">
          <label class="form-label small fw-bold">Address</label>
          <input type="text" formControlName="address" class="form-control bg-light border-0">
        </div>
        <div class="col-md-4">
          <label class="form-label small fw-bold">Phone</label>
          <input type="text" formControlName="phone" class="form-control bg-light border-0">
        </div>
        <div class="col-md-4">
          <label class="form-label small fw-bold">Email</label>
          <input type="email" formControlName="email" class="form-control bg-light border-0">
        </div>
        <div class="col-md-8">
          <label class="form-label small fw-bold">Manager ID</label>
          <input type="text" formControlName="managerId" class="form-control bg-light border-0">
        </div>
        <div class="col-md-4 d-flex align-items-end">
          <button type="submit" class="btn btn-primary w-100 rounded-pill fw-bold" [disabled]="branchForm.invalid || isLoading">
            Save Branch
          </button>
        </div>
      </div>
    </form>
  </div>

  <div class="row g-4">
    <div *ngFor="let branch of branches()" class="col-md-6 col-lg-4">
      <div class="card border-0 shadow-sm rounded-5 h-100 overflow-hidden transition-all hover-translate-y">
        <div class="card-header bg-primary bg-opacity-10 border-0 p-4 d-flex justify-content-between align-items-center">
          <span class="badge bg-primary text-white rounded-pill px-3 py-2 small fw-bold">#{{branch.branchCode}}</span>
          <span [class]="'badge rounded-pill px-3 py-2 small ' + (branch.status === 'active' ? 'bg-success bg-opacity-10 text-success' : 'bg-danger bg-opacity-10 text-danger')">
            {{branch.status | titlecase}}
          </span>
        </div>
        <div class="card-body p-4">
          <h5 class="fw-bold text-dark mb-3">{{branch.branchName}}</h5>
          <div class="d-flex flex-column gap-3 mb-4">
            <div class="d-flex align-items-start gap-3 small text-muted">
              <i class="bi bi-geo-alt text-primary"></i>
              <span>{{branch.address}}</span>
            </div>
            <div class="d-flex align-items-center gap-3 small text-muted">
              <i class="bi bi-telephone text-primary"></i>
              <span>{{branch.phone}}</span>
            </div>
            <div class="d-flex align-items-center gap-3 small text-muted">
              <i class="bi bi-diagram-2 text-primary"></i>
              <span>Routing: <code class="text-dark fw-bold">{{branch.routingNumber}}</code></span>
            </div>
          </div>
          <div class="bg-light rounded-4 p-3 mb-4 d-flex justify-content-between align-items-center">
             <div>
               <h6 class="small fw-bold text-muted mb-0">Branch Manager</h6>
               <span class="small text-dark fw-bold">ID: {{branch.managerId}}</span>
             </div>
             <button class="btn btn-white bg-white btn-sm rounded-circle shadow-sm border"><i class="bi bi-person-gear text-primary"></i></button>
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-outline-primary btn-sm rounded-pill flex-grow-1 fw-bold">Edit Details</button>
            <button class="btn btn-light btn-sm rounded-circle shadow-sm"><i class="bi bi-trash text-danger"></i></button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
