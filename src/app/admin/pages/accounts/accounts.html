<div class="row align-items-center mb-5">
  <div class="col-md-8">
    <h2 class="fw-bold text-dark mb-1">Global Account Management</h2>
    <p class="text-muted small mb-0">Oversee all customer accounts, balances, and operational statuses across all branches.</p>
  </div>
</div>

<div class="card border-0 shadow-sm rounded-5 overflow-hidden">
  <div class="card-header bg-white py-4 px-4 border-0 border-bottom d-flex justify-content-between align-items-center">
    <div class="input-group w-50">
      <span class="input-group-text bg-light border-0"><i class="bi bi-search text-muted"></i></span>
      <input type="text" class="form-control bg-light border-0" placeholder="Search by account number or customer ID...">
    </div>
  </div>
  <div class="table-responsive">
    <table class="table table-hover align-middle mb-0">
      <thead class="bg-light text-muted small text-uppercase ls-widest">
        <tr>
          <th class="ps-4 py-3 border-0">Account Number</th>
          <th class="py-3 border-0">Customer ID</th>
          <th class="py-3 border-0">Branch</th>
          <th class="py-3 border-0">Balance</th>
          <th class="py-3 border-0">Status</th>
          <th class="py-3 text-end pe-4 border-0">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let acc of accounts()">
          <td class="ps-4 py-3">
            <h6 class="fw-bold text-primary font-monospace mb-0">{{acc.accountNumber}}</h6>
          </td>
          <td><span class="small fw-bold text-dark">{{acc.customerId}}</span></td>
          <td><span class="badge bg-light text-dark border rounded-pill px-3 py-2 small fw-bold">BR-{{acc.branchId}}</span></td>
          <td><span class="fw-bold text-dark">${{acc.balance | number:'1.2-2'}}</span></td>
          <td>
            <span [class]="'badge rounded-pill px-3 py-2 small ' + (acc.status === 'active' ? 'bg-success bg-opacity-10 text-success' : 'bg-danger bg-opacity-10 text-danger')">
              {{acc.status | titlecase}}
            </span>
          </td>
          <td class="text-end pe-4">
            <button class="btn btn-light btn-sm rounded-pill fw-bold text-primary shadow-sm border px-3">Manage</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
