<div class="row align-items-center mb-5">
  <div class="col-md-8">
    <h2 class="fw-bold text-dark mb-1">Global Admin Reports</h2>
    <p class="text-muted small mb-0">Generate and download executive-level consolidated banking reports.</p>
  </div>
</div>

<div class="row g-4">
  <div *ngFor="let rep of adminReports" class="col-md-6 col-lg-4">
    <div class="card border-0 shadow-sm rounded-5 h-100 p-4 transition-all hover-translate-y">
      <div class="d-flex align-items-center justify-content-between mb-3">
        <span [class]="'badge rounded-pill px-3 py-2 small fw-bold ' + 
          (rep.type === 'Financial' ? 'bg-success bg-opacity-10 text-success' : 
           rep.type === 'Security' ? 'bg-danger bg-opacity-10 text-danger' : 
           'bg-primary bg-opacity-10 text-primary')">
          {{rep.type}}
        </span>
        <span class="small text-muted fw-bold">{{rep.date}}</span>
      </div>
      <h5 class="fw-bold text-dark mb-2">{{rep.title}}</h5>
      <p class="text-muted small mb-4 flex-grow-1">Scope: <span class="fw-bold">{{rep.scope}} Access</span></p>
      
      <div class="d-flex gap-2 mt-auto">
        <button class="btn btn-light rounded-pill fw-bold btn-sm flex-grow-1 border">Preview Board</button>
        <button class="btn btn-dark rounded-circle shadow-sm border-0 btn-sm" style="width: 32px; height: 32px;">
          <i class="bi bi-download"></i>
        </button>
      </div>
    </div>
  </div>
</div>
