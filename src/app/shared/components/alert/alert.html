<div *ngIf="visible" [class]="'alert alert-' + type + ' alert-dismissible fade show rounded-4 border-0 shadow-sm p-4'" role="alert">
  <div class="d-flex align-items-center gap-3">
    <i [class]="'bi ' + getIcon() + ' fs-4'"></i>
    <div>
      <h6 *ngIf="title" class="fw-bold mb-1">{{title}}</h6>
      <p class="mb-0 small">{{message}}</p>
    </div>
  </div>
  <button type="button" class="btn-close mt-2 me-2" (click)="close()" aria-label="Close"></button>
</div>
