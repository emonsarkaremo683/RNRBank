<nav aria-label="breadcrumb" class="bg-white py-3 shadow-sm mb-4 border-top border-bottom">
  <div class="container">
    <ol class="breadcrumb mb-0 small fw-bold">
      <li class="breadcrumb-item"><a routerLink="/" class="text-decoration-none">Home</a></li>
      <li *ngFor="let item of items; let last = last" class="breadcrumb-item" [class.active]="last" [attr.aria-current]="last ? 'page' : null">
        <a *ngIf="!last" [routerLink]="item.link" class="text-decoration-none">{{item.label}}</a>
        <span *ngIf="last" class="text-secondary">{{item.label}}</span>
      </li>
    </ol>
  </div>
</nav>
