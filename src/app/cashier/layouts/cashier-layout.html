<div class="d-flex" style="min-height: 100vh; background-color: #f8f9fa;">
  <!-- Sidebar -->
  <div [class.d-none]="!isSidebarOpen()" class="bg-dark text-white shadow-lg flex-shrink-0" style="width: 280px; transition: all 0.3s;">
    <div class="p-4 border-bottom border-secondary">
      <div class="d-flex align-items-center gap-3">
        <div class="bg-primary rounded-circle d-flex align-items-center justify-content-center shadow" style="width: 45px; height: 45px;">
          <i class="bi bi-bank2 fs-4 text-white"></i>
        </div>
        <div>
          <h5 class="fw-bold mb-0">RNR Bank</h5>
          <span class="text-primary small fw-bold text-uppercase ls-widest" style="font-size: 0.7rem;">Cashier Portal</span>
        </div>
      </div>
    </div>

    <div class="py-4 px-3 overflow-auto" style="height: calc(100vh - 90px);">
      <nav class="nav flex-column gap-2">
        <a *ngFor="let item of menuItems" 
           [routerLink]="item.path" 
           routerLinkActive="bg-primary text-white shadow"
           class="nav-link text-white rounded-3 p-3 d-flex align-items-center gap-3 transition-all hover-bg-primary">
          <i [class]="'bi ' + item.icon + ' fs-5'"></i>
          <span class="fw-medium">{{item.label}}</span>
        </a>

        <div class="mt-4 pt-4 border-top border-secondary">
          <button (click)="logout()" class="nav-link text-danger w-100 text-start rounded-3 p-3 d-flex align-items-center gap-3 hover-bg-danger-subtle">
            <i class="bi bi-box-arrow-right fs-5"></i>
            <span class="fw-bold">Logout</span>
          </button>
        </div>
      </nav>
    </div>
  </div>

  <!-- Main Content Area -->
  <div class="flex-grow-1 overflow-auto" style="height: 100vh;">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top py-3 shadow-sm px-4">
      <div class="container-fluid">
        <button class="btn btn-light border rounded-circle shadow-sm me-3" (click)="isSidebarOpen.set(!isSidebarOpen())">
          <i class="bi bi-list fs-5"></i>
        </button>

        <div class="ms-auto d-flex align-items-center gap-4">
          <div class="d-none d-md-block text-end">
            <h6 class="fw-bold mb-0 small">{{currentUser()?.fullName}} <span class="text-primary fw-normal small"> • {{currentUser()?.role}}</span></h6>
            <span class="text-muted small">Branch ID: <span class="fw-bold text-dark">{{currentUser()?.branchId || 'BR-001'}}</span></span>
          </div>
          <div class="dropdown">
            <img [src]="currentUser()?.profilePhoto || 'https://api.dicebear.com/7.x/avataaars/svg?seed=Cashier'" 
                 class="rounded-circle border border-2 border-primary cursor-pointer shadow-sm" 
                 style="width: 45px; height: 45px; object-fit: cover;"
                 data-bs-toggle="dropdown">
            <ul class="dropdown-menu dropdown-menu-end shadow border-0 rounded-4 mt-2">
              <li class="px-3 py-2 border-bottom">
                <span class="d-block fw-bold small">{{currentUser()?.fullName}}</span>
                <span class="text-muted small">{{currentUser()?.email}}</span>
              </li>
              <li><a class="dropdown-item py-2 px-3 mt-1" routerLink="/cashier/profile"><i class="bi bi-person me-2"></i> My Profile</a></li>
              <li><a class="dropdown-item py-2 px-3" routerLink="/cashier/settings"><i class="bi bi-gear me-2"></i> Settings</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><button (click)="logout()" class="dropdown-item text-danger py-2 px-3"><i class="bi bi-box-arrow-right me-2"></i> Logout</button></li>
            </ul>
          </div>
        </div>
      </div>
    </nav>

    <!-- Page Content -->
    <main class="p-4">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
