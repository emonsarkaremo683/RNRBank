<div class="row align-items-center mb-4">
  <div class="col-md-8">
    <h2 class="fw-bold text-dark mb-1">Beneficiary Directory</h2>
    <p class="text-muted small mb-0">Manage your saved accounts for quick and easy transfers.</p>
  </div>
  <div class="col-md-4 text-md-end mt-3 mt-md-0">
    <button class="btn btn-primary rounded-pill px-4 fw-bold shadow-sm" (click)="toggleForm()">
      <i class="bi" [class.bi-person-plus]="!showForm" [class.bi-x-lg]="showForm"></i> 
      {{ showForm ? 'Cancel' : 'Add Beneficiary' }}
    </button>
  </div>
</div>

<div *ngIf="showForm" class="card border-0 shadow-sm rounded-5 mb-5 p-4 bg-primary bg-opacity-10">
  <h5 class="fw-bold mb-4">Add New Beneficiary</h5>
  <form [formGroup]="beneficiaryForm" (ngSubmit)="onSubmit()">
    <div class="row g-3">
      <div class="col-md-3">
        <label class="form-label small fw-bold">Full Name</label>
        <input type="text" formControlName="name" class="form-control bg-white border-0 py-2">
      </div>
      <div class="col-md-3">
        <label class="form-label small fw-bold">Account Number</label>
        <input type="text" formControlName="accountNumber" class="form-control bg-white border-0 py-2">
      </div>
      <div class="col-md-2">
        <label class="form-label small fw-bold">Bank Name</label>
        <select formControlName="bankName" class="form-select bg-white border-0 py-2">
          <option value="RNR Bank">RNR Bank</option>
          <option value="City Bank">City Bank</option>
          <option value="Brac Bank">Brac Bank</option>
        </select>
      </div>
      <div class="col-md-2">
        <label class="form-label small fw-bold">Relationship</label>
        <input type="text" formControlName="relation" class="form-control bg-white border-0 py-2" placeholder="e.g. Brother">
      </div>
      <div class="col-md-2 d-flex align-items-end">
        <button type="submit" class="btn btn-primary w-100 rounded-pill fw-bold py-2" [disabled]="beneficiaryForm.invalid || isLoading">
          <span *ngIf="!isLoading">Save</span>
          <div *ngIf="isLoading" class="spinner-border spinner-border-sm" role="status"></div>
        </button>
      </div>
    </div>
  </form>
</div>

<div class="row g-4">
  <div *ngFor="let ben of beneficiaries()" class="col-md-6 col-xl-4">
    <div class="card border-0 shadow-sm rounded-4 h-100 position-relative overflow-hidden transition-all hover-translate-y">
      <div class="card-body p-4">
        <div class="d-flex align-items-start gap-3 mb-4">
          <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex align-items-center justify-content-center fw-bold fs-5" style="width: 50px; height: 50px; flex-shrink: 0;">
            {{ben.name.charAt(0)}}
          </div>
          <div class="flex-grow-1">
            <h6 class="fw-bold text-dark mb-1">{{ben.name}}</h6>
            <p class="text-muted small mb-0">{{ben.relation}}</p>
          </div>
          <button class="btn btn-light btn-sm rounded-circle shadow-sm" (click)="deleteBeneficiary(ben.id)">
            <i class="bi bi-trash text-danger"></i>
          </button>
        </div>
        
        <div class="bg-light rounded-4 p-3 mb-4">
          <div class="d-flex justify-content-between mb-2">
            <span class="small text-muted fw-bold">Account</span>
            <span class="small fw-bold font-monospace">{{ben.accountNumber}}</span>
          </div>
          <div class="d-flex justify-content-between">
            <span class="small text-muted fw-bold">Bank</span>
            <span class="small fw-bold">{{ben.bankName}}</span>
          </div>
        </div>
        
        <a [routerLink]="['/customer/transactions']" [queryParams]="{transferTo: ben.accountNumber}" class="btn btn-outline-primary w-100 rounded-pill fw-bold shadow-sm d-flex align-items-center justify-content-center gap-2">
          <i class="bi bi-send"></i> Send Money
        </a>
      </div>
    </div>
  </div>
  
  <div *ngIf="beneficiaries().length === 0" class="col-12 text-center py-5">
    <i class="bi bi-people text-muted opacity-50 display-1 mb-3"></i>
    <h5 class="fw-bold text-dark">No Beneficiaries Found</h5>
    <p class="text-muted small">You haven't added any beneficiaries yet.</p>
  </div>
</div>
