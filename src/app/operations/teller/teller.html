<div class="row align-items-center mb-4">
  <div class="col-md-8">
    <h2 class="fw-bold text-dark mb-1">Teller Dashboard</h2>
    <p class="text-muted small mb-0">Manage customer queue, handle over-the-counter transactions, and view daily limits.</p>
  </div>
</div>

<div class="row g-4 mb-5">
  <div class="col-lg-7">
    <div class="card border-0 shadow-sm rounded-5 p-4 p-md-5 h-100">
      <h5 class="fw-bold text-dark mb-4">Serving Now</h5>
      <div class="bg-primary bg-opacity-10 rounded-4 p-5 text-center mb-4 border border-primary border-2 border-dashed">
        <h1 class="display-1 fw-bold text-primary mb-0">{{currentNumber()}}</h1>
        <p class="text-muted fw-bold text-uppercase ls-widest mb-0 mt-2">Cash Deposit</p>
      </div>
      <div class="d-flex gap-3">
        <button class="btn btn-primary btn-lg flex-grow-1 rounded-pill fw-bold shadow-sm" (click)="callNext()">Complete & Next</button>
        <button class="btn btn-outline-danger btn-lg rounded-pill fw-bold px-4">Skip</button>
      </div>
    </div>
  </div>
  
  <div class="col-lg-5">
    <div class="card border-0 shadow-sm rounded-5 overflow-hidden h-100">
      <div class="card-header bg-white py-4 px-4 border-0 d-flex justify-content-between align-items-center">
        <h5 class="fw-bold text-dark mb-0">Up Next</h5>
        <span class="badge bg-primary rounded-pill">{{tellerQueue().length - 1}} Waiting</span>
      </div>
      <div class="list-group list-group-flush">
        <ng-container *ngFor="let q of tellerQueue()">
          <div class="list-group-item p-4 border-bottom" *ngIf="q.token !== currentNumber()">
            <div class="d-flex justify-content-between align-items-center">
              <div class="d-flex align-items-center gap-3">
                <div class="bg-light rounded-circle d-flex align-items-center justify-content-center fw-bold fs-5 text-dark" style="width: 50px; height: 50px;">
                  {{q.token}}
                </div>
                <div>
                  <h6 class="fw-bold text-dark mb-1">{{q.service}}</h6>
                  <span class="small text-muted"><i class="bi bi-clock me-1"></i> Waiting: {{q.waitTime}}</span>
                </div>
              </div>
              <button class="btn btn-light btn-sm rounded-pill fw-bold text-primary border" (click)="updateQueue()">Call</button>
            </div>
          </div>
        </ng-container>
      </div>
    </div>
  </div>
</div>
