<div class="offcanvas-lg offcanvas-start bg-dark text-white border-end shadow d-flex flex-column overflow-y-auto" id="operationsSidebar" style="width: 280px; min-height: 100vh;">
  <div class="p-4 d-flex align-items-center gap-3 border-bottom border-secondary border-opacity-25" style="position: sticky; top: 0; background: #212529; z-index: 10;">
    <div class="bg-primary rounded-3 p-2">
      <i class="bi bi-bank2 fs-4 text-white"></i>
    </div>
    <div>
      <h5 class="fw-bold mb-0">RNR <span class="text-warning">Core</span></h5>
      <span class="small text-muted text-uppercase fw-bold ls-widest" style="font-size: 0.65rem;">Operations Module</span>
    </div>
  </div>

  <div class="p-3 flex-grow-1">
    <h6 class="text-muted small text-uppercase fw-bold ls-widest px-3 mb-3">Core Navigation</h6>
    <ul class="nav flex-column gap-1">
      <li class="nav-item">
        <a routerLink="/operations/dashboard" routerLinkActive="bg-primary text-white" class="nav-link text-white-50 p-3 rounded-3 d-flex align-items-center gap-3 transition-all hover-white">
          <i class="bi bi-grid-1x2 fs-5"></i>
          <span class="fw-bold">Dashboard</span>
        </a>
      </li>
      <li class="nav-item" *ngIf="hasRole('ADMIN') || hasRole('MANAGER') || hasRole('CS_OFFICER')">
        <a routerLink="/operations/accounts" routerLinkActive="bg-primary text-white" class="nav-link text-white-50 p-3 rounded-3 d-flex align-items-center gap-3 transition-all hover-white">
          <i class="bi bi-journal-album fs-5"></i>
          <span class="fw-bold">Accounts</span>
        </a>
      </li>
      <li class="nav-item" *ngIf="hasRole('ADMIN') || hasRole('MANAGER') || hasRole('AUDITOR')">
        <a routerLink="/operations/transactions" routerLinkActive="bg-primary text-white" class="nav-link text-white-50 p-3 rounded-3 d-flex align-items-center gap-3 transition-all hover-white">
          <i class="bi bi-arrow-left-right fs-5"></i>
          <span class="fw-bold">Transactions</span>
        </a>
      </li>
      <li class="nav-item" *ngIf="hasRole('ADMIN') || hasRole('MANAGER') || hasRole('CASH_OFFICER')">
        <a routerLink="/operations/cash" routerLinkActive="bg-primary text-white" class="nav-link text-white-50 p-3 rounded-3 d-flex align-items-center gap-3 transition-all hover-white">
          <i class="bi bi-cash-stack fs-5"></i>
          <span class="fw-bold">Cash Operations</span>
        </a>
      </li>
      <li class="nav-item" *ngIf="hasRole('ADMIN') || hasRole('MANAGER')">
        <a routerLink="/operations/transfers" routerLinkActive="bg-primary text-white" class="nav-link text-white-50 p-3 rounded-3 d-flex align-items-center gap-3 transition-all hover-white">
          <i class="bi bi-send fs-5"></i>
          <span class="fw-bold">Transfers</span>
        </a>
      </li>
    </ul>

    <h6 class="text-muted small text-uppercase fw-bold ls-widest px-3 mt-4 mb-3">Support & Branch</h6>
    <ul class="nav flex-column gap-1">
      <li class="nav-item" *ngIf="hasRole('ADMIN') || hasRole('MANAGER') || hasRole('CS_OFFICER')">
        <a routerLink="/operations/beneficiaries" routerLinkActive="bg-primary text-white" class="nav-link text-white-50 p-3 rounded-3 d-flex align-items-center gap-3 transition-all hover-white">
          <i class="bi bi-people fs-5"></i>
          <span class="fw-bold">Beneficiaries</span>
        </a>
      </li>
      <li class="nav-item" *ngIf="hasRole('ADMIN') || hasRole('MANAGER') || hasRole('CS_OFFICER')">
        <a routerLink="/operations/statements" routerLinkActive="bg-primary text-white" class="nav-link text-white-50 p-3 rounded-3 d-flex align-items-center gap-3 transition-all hover-white">
          <i class="bi bi-file-earmark-text fs-5"></i>
          <span class="fw-bold">Statements</span>
        </a>
      </li>
      <li class="nav-item" *ngIf="hasRole('ADMIN') || hasRole('MANAGER')">
        <a routerLink="/operations/mobile-banking" routerLinkActive="bg-primary text-white" class="nav-link text-white-50 p-3 rounded-3 d-flex align-items-center gap-3 transition-all hover-white">
          <i class="bi bi-phone fs-5"></i>
          <span class="fw-bold">Mobile Ops</span>
        </a>
      </li>
      <li class="nav-item" *ngIf="hasRole('ADMIN') || hasRole('MANAGER') || hasRole('CASH_OFFICER')">
        <a routerLink="/operations/teller" routerLinkActive="bg-primary text-white" class="nav-link text-white-50 p-3 rounded-3 d-flex align-items-center gap-3 transition-all hover-white">
          <i class="bi bi-person-workspace fs-5"></i>
          <span class="fw-bold">Teller Hub</span>
        </a>
      </li>
      <li class="nav-item" *ngIf="hasRole('ADMIN') || hasRole('MANAGER')">
        <a routerLink="/operations/branch" routerLinkActive="bg-primary text-white" class="nav-link text-white-50 p-3 rounded-3 d-flex align-items-center gap-3 transition-all hover-white">
          <i class="bi bi-building fs-5"></i>
          <span class="fw-bold">Branch Banking</span>
        </a>
      </li>
      <li class="nav-item" *ngIf="hasRole('ADMIN') || hasRole('MANAGER') || hasRole('AUDITOR')">
        <a routerLink="/operations/reports" routerLinkActive="bg-primary text-white" class="nav-link text-white-50 p-3 rounded-3 d-flex align-items-center gap-3 transition-all hover-white">
          <i class="bi bi-graph-up fs-5"></i>
          <span class="fw-bold">Reports</span>
        </a>
      </li>
    </ul>
  </div>

  <div class="p-4 border-top border-secondary border-opacity-25 text-center" style="position: sticky; bottom: 0; background: #212529; z-index: 10;">
     <button class="btn btn-outline-danger w-100 rounded-pill fw-bold" (click)="logout()">
       <i class="bi bi-box-arrow-left me-2"></i> Secure Logout
     </button>
  </div>
</div>
